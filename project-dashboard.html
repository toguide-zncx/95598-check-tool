<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>95598智能座席助手项目实施看板</title>
<style>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#F5F5F5;color:#222;line-height:1.5;-webkit-tap-highlight-color:transparent}
.page{max-width:1200px;margin:0 auto;padding:16px}
@media(min-width:768px){.page{padding:20px}}

.header{background:linear-gradient(135deg,#006B54,#008667,#4CAF50);color:#fff;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,77,58,.2)}
.header h1{font-size:18px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.header .sub{font-size:12px;opacity:.9;margin-bottom:10px}
.header .meta{display:flex;gap:8px;flex-wrap:wrap}
.header .meta-item{background:rgba(255,255,255,.15);border-radius:6px;padding:5px 10px;font-size:11px;display:flex;align-items:center;gap:4px}
.header .meta-item b{font-weight:700;font-size:13px}
@media(min-width:768px){.header{padding:24px 28px}.header h1{font-size:20px}.header .meta{gap:16px}.header .meta-item{padding:6px 14px;font-size:12px}}

.section{background:#fff;border-radius:10px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.05);border-left:4px solid #006B54}
.section h2{font-size:13px;font-weight:700;color:#006B54;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section.orange{border-left-color:#E65100}.section.orange h2{color:#E65100}
.section.purple{border-left-color:#6A1B9A}.section.purple h2{color:#6A1B9A}
@media(min-width:768px){.section{padding:16px 20px}.section h2{font-size:14px}}

.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px}
.kpi-card{background:#fff;border:1px solid #E0E0E0;border-radius:8px;padding:10px 8px;text-align:center;position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.kpi-card.total::before{background:#006B54}.kpi-card.done::before{background:#4CAF50}
.kpi-card.doing::before{background:#1565C0}.kpi-card.wait::before{background:#E65100}
.kpi-card.critical::before{background:#9E9E9E}
.kpi-card .kc-num{font-size:24px;font-weight:800;line-height:1}
.kpi-card.total .kc-num{color:#006B54}.kpi-card.done .kc-num{color:#4CAF50}
.kpi-card.doing .kc-num{color:#1565C0}.kpi-card.wait .kc-num{color:#E65100}
.kpi-card.critical .kc-num{color:#9E9E9E}
.kpi-card .kc-label{font-size:10px;color:#999;margin-top:2px}
.kpi-card .kc-bar{height:3px;background:#e8e8e8;border-radius:2px;margin-top:6px;overflow:hidden}
.kpi-card .kc-bar-fill{height:100%;border-radius:2px}
@media(min-width:768px){.kpi-card{padding:14px}.kpi-card .kc-num{font-size:32px}.kpi-card .kc-label{font-size:11px;margin-top:4px}}

.sync-bar{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.sync-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;transition:all .25s;border:none}
.sync-btn.primary{background:linear-gradient(135deg,#008667,#4CAF50);color:#fff;box-shadow:0 2px 8px rgba(0,107,84,.2)}
.sync-btn.primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.sync-btn.primary:active{transform:translateY(0)}
.sync-btn.primary.syncing{opacity:.7;pointer-events:none}
.sync-time{font-size:10px;color:#999}
.sync-toast{position:fixed;top:20px;right:20px;padding:10px 18px;border-radius:10px;color:#fff;font-size:12px;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);display:none}
.sync-toast.show{display:block;animation:fadeIn .3s}
.sync-toast.success{background:linear-gradient(135deg,#008667,#4CAF50)}
.sync-toast.error{background:#C62828}
.sync-toast.info{background:#1565C0}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

.day-timeline{display:flex;gap:0;position:relative}
.day-col{flex:1;position:relative;min-width:0}
.day-header{text-align:center;padding:8px 4px;font-size:12px;font-weight:700;border-radius:8px 8px 0 0;color:#fff}
.day-date{text-align:center;font-size:10px;color:#999;padding:3px 0;background:#fafafa;border-bottom:1px solid #E0E0E0}
.day-body{background:#FAFAFA;border:1px solid #E0E0E0;border-top:none;border-radius:0 0 8px 8px;padding:6px;min-height:120px}
.day-task{background:#fff;border:1px solid #E0E0E0;border-radius:6px;padding:6px 8px;margin-bottom:4px;font-size:11px;line-height:1.4}
.day-task .task-name{font-weight:600;color:#222;margin-bottom:2px;font-size:11px}
.day-task .task-owner{font-size:10px;color:#1565C0;display:flex;align-items:center;gap:3px}
.day-task .task-status{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600;margin-top:2px}
.day-task .task-status.todo{background:#FFF3E0;color:#E65100}
.day-task .task-status.doing{background:#E3F2FD;color:#1565C0}
.day-task .task-status.done{background:#E8F5E9;color:#2E7D32}
.day-task.critical{border-left:3px solid #C62828}
.day-task.important{border-left:3px solid #E65100}
.day-task.normal{border-left:3px solid #4CAF50}
.day-arrow{position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:14px;color:#999;z-index:2}
@media(max-width:767px){
  .day-timeline{flex-direction:column;gap:8px}
  .day-arrow{display:none}
  .day-body{min-height:auto}
}
@media(min-width:768px){
  .day-header{font-size:13px;padding:10px 8px}
  .day-body{padding:8px}
  .day-task{padding:8px 10px;margin-bottom:6px}
}

.tab-bar{display:flex;gap:0;margin-bottom:12px;background:#fff;border-radius:8px;overflow:hidden;border:1px solid #E0E0E0}
.tab-btn{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;color:#555;cursor:pointer;border:none;background:none;transition:all .2s}
.tab-btn.active{color:#fff;background:#006B54}
.tab-panel{display:none}
.tab-panel.active{display:block}
@media(min-width:768px){.tab-bar{display:none}.tab-panel{display:block!important}}

.phase-list{display:grid;gap:10px}
.phase-item{background:#FAFAFA;border:1px solid #E0E0E0;border-radius:8px;padding:12px 14px}
.phase-item .pi-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.phase-item .pi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.phase-item .pi-dot.done{background:#4CAF50}
.phase-item .pi-dot.active{background:#1565C0;box-shadow:0 0 0 3px rgba(21,101,192,.2)}
.phase-item .pi-dot.pending{background:#BDBDBD}
.phase-item .pi-title{font-size:12px;font-weight:700;flex:1}
.phase-item .pi-date{font-size:10px;color:#999}
.phase-item .pi-bar-wrap{height:6px;background:#e0e0e0;border-radius:3px;overflow:hidden;margin-bottom:4px}
.phase-item .pi-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.phase-item .pi-stats{display:flex;gap:10px;font-size:10px;color:#555;flex-wrap:wrap}
.phase-item .pi-stats b{font-weight:700}
.phase-item .pi-tasks{margin-top:6px;display:grid;gap:3px}
.phase-item .pi-task{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 8px;background:#fff;border-radius:4px;border:1px solid #f0f0f0}
.phase-item .pi-task .pt-idx{min-width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.phase-item .pi-task .pt-idx.critical{background:#C62828}
.phase-item .pi-task .pt-idx.important{background:#E65100}
.phase-item .pi-task .pt-idx.normal{background:#4CAF50}
.phase-item .pi-task .pt-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.phase-item .pi-task .pt-owner{font-size:10px;color:#1565C0;white-space:nowrap}
.phase-item .pi-header{cursor:pointer;user-select:none;position:relative}
.phase-item .pi-toggle{font-size:10px;color:#999;transition:transform .25s;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;background:#f0f0f0;flex-shrink:0}
.phase-item.collapsed .pi-toggle{transform:rotate(-90deg)}
.phase-item .pi-tasks{max-height:2000px;overflow:hidden;transition:max-height .35s ease,opacity .25s ease,margin .25s ease;opacity:1;margin-top:6px}
.phase-item.collapsed .pi-tasks{max-height:0;opacity:0;margin-top:0}
.phase-item .pi-bar-wrap,.phase-item .pi-stats{transition:opacity .2s}
.phase-item.collapsed .pi-bar-wrap,.phase-item.collapsed .pi-stats{opacity:.6}
@media(min-width:768px){.phase-item{padding:14px 16px}.phase-item .pi-title{font-size:13px}}

.tag{display:inline-block;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700;white-space:nowrap;min-width:52px;text-align:center}
.tag-normal{background:#C8E6C9;color:#1B5E20}
.tag-rd{background:#E3F2FD;color:#0D47A1}
.tag-ops{background:#FFF3E0;color:#E65100}

.binding-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.binding-card{background:#FAFAFA;border:1px solid #E0E0E0;border-radius:8px;padding:10px;text-align:center}
.binding-card .bc-name{font-size:11px;font-weight:700;margin-bottom:6px;color:#222}
.binding-card .bc-ring{margin:0 auto 4px;position:relative;width:50px;height:50px}
.binding-card .bc-ring svg{width:50px;height:50px}
.binding-card .bc-count{font-size:10px;color:#555;margin-top:2px}
.binding-card .bc-status{font-size:9px;margin-top:1px}
.binding-card .bc-status.ready{color:#4CAF50;font-weight:600}
.binding-card .bc-status.pending{color:#E65100;font-weight:600}
@media(min-width:768px){.binding-grid{grid-template-columns:repeat(4,1fr);gap:10px}.binding-card .bc-name{font-size:12px}.binding-card .bc-ring{width:56px;height:56px}.binding-card .bc-ring svg{width:56px;height:56px}}

.loading{text-align:center;padding:40px;color:#999;font-size:13px}
.loading .spinner{display:inline-block;width:20px;height:20px;border:2px solid #E0E0E0;border-top-color:#006B54;border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

@media print{.page{padding:10px}.header{box-shadow:none}.section{break-inside:avoid}}

</style>
</head>
<body>
<div class="page">

<div class="header">
  <h1>📊 95598智能座席助手项目实施看板</h1>
  <div class="sub">穿透式管理 · 每日可视化汇报 · 精细化任务分解 · 明确责任到人</div>
  <div class="meta" id="headerMeta">
    <div class="meta-item">📅 更新<span><b>--</b></span></div>
    <div class="meta-item">📋 任务<span><b>--</b></span></div>
    <div class="meta-item">👥 试用<span><b>80人</b></span></div>
    <div class="meta-item">📍 状态<span><b>推进中</b></span></div>
  </div>
</div>

<div class="kpi-grid" id="kpiGrid"></div>

<div class="sync-bar">
  <button class="sync-btn primary" id="syncBtn" onclick="syncFromCloud()">🔄 同步项目计划</button>
  <span class="sync-time" id="syncTime">加载中...</span>
  <span style="font-size:10px;color:#999;margin-left:auto">数据来源：<a href="https://www.kdocs.cn/l/cp5h5LVYzFo3" target="_blank" style="color:#008667;text-decoration:none">金山文档</a></span>
</div>
<div class="sync-toast" id="syncToast"></div>

<div class="section" id="timelineSection">
  <h2>📊 本周实施时间线</h2>
  <div id="timelineContent"><div class="loading"><span class="spinner"></span>加载数据中...</div></div>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('phases')">🕐 阶段</button>
  <button class="tab-btn" onclick="switchTab('binding')">☎️ 绑定</button>
</div>

<div class="tab-panel active" id="tab-phases">
  <div class="section" id="phasesSection">
    <h2>🕐 四阶段推进进度</h2>
    <div id="phasesContent"><div class="loading"><span class="spinner"></span>加载数据中...</div></div>
  </div>
</div>

<div class="tab-panel" id="tab-binding">
  <div class="section purple">
    <h2>☎️ 80话机坐席绑定与监控台账</h2>
    <div id="bindingSummary" style="font-size:11px;color:#555;margin-bottom:10px">加载中...</div>
    <div class="binding-grid" id="bindingGrid"></div>
  </div>
</div>

<div class="section" id="delaySection" style="border-left-color:#4CAF50">
  <h2 id="delayTitle" style="color:#4CAF50">✅ 无延期工作项</h2>
  <div id="delayContent" style="font-size:12px;color:#666;padding:4px 0">所有任务均在计划时间内推进中 🎉</div>
</div>

<div style="text-align:center;font-size:10px;color:#999;padding:10px 0">
  95598智能座席助手项目实施看板 · 数据来源：金山文档 · 2026年6月
</div>

</div>

<script>
/* ===== Configuration ===== */
var DATA_URL='https://toguide-zncx.github.io/95598-check-tool/plan-data.json';

var PHASES=[
  {name:'一、组织动员与资源准备',date:'6.24-6.25',ids:[1,2,3,4,5,6,7,8,9]},
  {name:'二、产品部署及联通测试',date:'6.24',ids:[10,11]},
  {name:'三、客服终端部署',date:'6.25-6.26',ids:[12,13,14]},
  {name:'四、正式试用启动',date:'6.26-6.29',ids:[15,16,17,18,19,20,21,22]},
  {name:'五、持续迭代',date:'6.30-7.10',ids:[23,24,25,26,27,28,29]}
];

var DAY_NAMES=['周日','周一','周二','周三','周四','周五','周六'];
function getWeekDefs(){
  var now=new Date();var dow=now.getDay()||7;
  var mon=new Date(now);mon.setDate(now.getDate()-(dow-1));mon.setHours(0,0,0,0);
  var defs=[];
  var gWd='linear-gradient(135deg,#008667,#006B54)';
  var gWe='linear-gradient(135deg,#78909C,#546E7A)';
  var gTd='linear-gradient(135deg,#FF7043,#E65100)';
  for(var i=0;i<5;i++){
    var d=new Date(mon);d.setDate(mon.getDate()+i);
    var mm=String(d.getMonth()+1).padStart(2,'0');
    var dd=String(d.getDate()).padStart(2,'0');
    var isTd=(d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth()&&d.getDate()===now.getDate());
    defs.push({
      key:mm+'-'+dd,
      end:[d.getFullYear(),d.getMonth()+1,d.getDate()],
      hdr:DAY_NAMES[d.getDay()]+' '+(d.getMonth()+1)+'/'+d.getDate(),
      date:(d.getMonth()+1)+'月'+d.getDate()+'日',
      cls:isTd?'today':'weekday',
      grad:isTd?gTd:gWd
    });
  }
  return defs;
}
var COL_DEFS=getWeekDefs();

var _data=null;

/* ===== Tab ===== */
function switchTab(n){
  var bs=document.querySelectorAll('.tab-btn'),ps=document.querySelectorAll('.tab-panel');
  for(var i=0;i<bs.length;i++)bs[i].classList.remove('active');
  for(var i=0;i<ps.length;i++)ps[i].classList.remove('active');
  var idx=n==='phases'?0:1;
  bs[idx].classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
}

/* ===== Helpers ===== */
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function getTask(id){if(!_data)return null;for(var i=0;i<_data.tasks.length;i++){if(String(_data.tasks[i].id)===String(id))return _data.tasks[i]}return null}
function pCls(p){return p==='关键'?'critical':p==='重要'?'important':'normal'}
function sInfo(t){
  if(t.status==='已完成')return{cls:'done',lbl:'✅ 已完成',tag:'tag-normal'};
  if(t.status==='进行中')return{cls:'doing',lbl:'🔄 进行中',tag:'tag-rd'};
  return{cls:'todo',lbl:'⏳ '+(t.start?fmtShort(t.start):'待开展'),tag:'tag-ops'};
}
function fmtShort(d){
  if(!d)return'';
  var p=String(d).split('-');
  if(p.length>=3)return parseInt(p[1])+'.'+parseInt(p[2]);
  return d;
}
function fmtDate(d){
  if(!d)return'';
  var p=String(d).split('-');
  if(p.length>=3)return parseInt(p[1])+'月'+parseInt(p[2])+'日';
  return d;
}
function parseD(d){
  if(!d)return null;
  var p=String(d).split('-');
  return p.length>=3?[parseInt(p[0]),parseInt(p[1]),parseInt(p[2])]:null;
}
function dateNum(d){return d[0]*10000+d[1]*100+d[2]}
function getColIdxs(t){
  var sd=parseD(t.start);if(!sd)return [];
  var ed=parseD(t.end);
  var ts=dateNum(sd),te=ed?dateNum(ed):ts;
  var r=[];
  for(var i=0;i<COL_DEFS.length;i++){var cd=dateNum(COL_DEFS[i].end);if(cd>=ts&&cd<=te)r.push(i);}
  return r;
}

/* ===== Render ===== */
function renderAll(){
  if(!_data)return;
  renderHeader();
  renderKPI();
  renderTimeline();
  renderPhases();
  renderBinding();
  renderDelay();
  document.getElementById('syncTime').textContent='上次同步：'+_data.syncTime;
}

function renderHeader(){
  var done=0,doing=0,pending=0;
  var ts=_data.tasks;
  for(var i=0;i<ts.length;i++){
    if(!ts[i].id||isNaN(parseInt(ts[i].id)))continue;
    if(ts[i].status==='已完成')done++;
    else if(ts[i].status==='进行中')doing++;
    else pending++;
  }
  var total=done+doing+pending;
  var dateStr=_data.syncTime?_data.syncTime.split(' ')[0].split('-').slice(1).join('/'):'--';
  var h='<div class="meta-item">📅 更新<span><b>'+esc(dateStr)+'</b></span></div>';
  h+='<div class="meta-item">📋 任务<span><b>'+total+'项</b></span></div>';
  h+='<div class="meta-item">👥 试用<span><b>80人</b></span></div>';
  h+='<div class="meta-item">📍 状态<span><b>'+(_data.stats.delayed>0?'有延期':'推进中')+'</b></span></div>';
  document.getElementById('headerMeta').innerHTML=h;
}

function renderKPI(){
  var done=0,doing=0,pending=0,delayed=_data.stats.delayed||0;
  var ts=_data.tasks;
  for(var i=0;i<ts.length;i++){
    if(!ts[i].id||isNaN(parseInt(ts[i].id)))continue;
    if(ts[i].status==='已完成')done++;
    else if(ts[i].status==='进行中')doing++;
    else pending++;
  }
  var total=done+doing+pending;
  var kpis=[
    {cls:'total',num:total,label:'总任务',bar:100,color:'#006B54'},
    {cls:'done',num:done,label:'已完成',bar:total?Math.round(done/total*100):0,color:'#4CAF50'},
    {cls:'doing',num:doing,label:'进行中',bar:total?Math.round(doing/total*100):0,color:'#1565C0'},
    {cls:'wait',num:pending,label:'待开展',bar:total?Math.round(pending/total*100):0,color:'#E65100'},
    {cls:'critical',num:delayed,label:'延期',bar:total?Math.round(delayed/total*100):0,color:'#9E9E9E'}
  ];
  var h='';
  for(var i=0;i<kpis.length;i++){
    var k=kpis[i];
    h+='<div class="kpi-card '+k.cls+'"><div class="kc-num">'+k.num+'</div><div class="kc-label">'+k.label+'</div><div class="kc-bar"><div class="kc-bar-fill" style="width:'+k.bar+'%;background:'+k.color+'"></div></div></div>';
  }
  document.getElementById('kpiGrid').innerHTML=h;
}

function renderTimeline(){
  var weekTitle='📊 本周实施时间线（'+COL_DEFS[0].key.replace('-','/')+' - '+COL_DEFS[COL_DEFS.length-1].key.replace('-','/')+'）';
  var h2=document.querySelector('#timelineContent').parentElement.querySelector('h2');
  if(h2)h2.textContent=weekTitle;
  var cols=[];
  for(var i=0;i<COL_DEFS.length;i++)cols.push([]);
  var ts=_data.tasks;
  for(var i=0;i<ts.length;i++){
    var t=ts[i];
    if(!t.id||isNaN(parseInt(t.id)))continue;
    var cis=getColIdxs(t);
    if(cis.length===0)continue;
    for(var k=0;k<cis.length;k++) cols[cis[k]].push(t);
  }
  var h='<div class="day-timeline">';
  for(var c=0;c<cols.length;c++){
    var def=COL_DEFS[c];
    var isFuture=!def.cls.includes('today');
    h+='<div class="day-col">';
    h+='<div class="day-header '+def.cls+'" style="background:'+def.grad+'">'+esc(def.hdr)+'</div>';
    h+='<div class="day-date">'+esc(def.date)+'</div>';
    h+='<div class="day-body">';
    var tasks=cols[c];
    for(var j=0;j<tasks.length;j++){
      var t=tasks[j];
      var si=sInfo(t);
      var pc=pCls(t.priority);
      var prefix=(String(t.id)==='16'?'🚀 ':'');
      var displayName=isFuture?t.name.replace(/，?目前进度[\d.]+%？/,''):t.name;
      h+='<div class="day-task '+pc+'">';
      h+='<div class="task-name">'+prefix+esc(displayName)+'</div>';
      h+='<div class="task-owner">👤 '+esc(t.owner)+'</div>';
      h+='<div class="task-status '+si.cls+'">'+si.lbl+'</div>';
      h+='</div>';
    }
    h+='</div>';
    if(c<cols.length-1)h+='<div class="day-arrow">→</div>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('timelineContent').innerHTML=h;
}

function renderPhases(){
  var h='';
  for(var p=0;p<PHASES.length;p++){
    var ph=PHASES[p];
    var tasks=[];
    for(var j=0;j<ph.ids.length;j++){
      var t=getTask(ph.ids[j]);
      if(t)tasks.push(t);
    }
    var done=0,doing=0;
    for(var j=0;j<tasks.length;j++){
      if(tasks[j].status==='已完成')done++;
      else if(tasks[j].status==='进行中')doing++;
    }
    var total=tasks.length;
    var pct=total?Math.round(done/total*100):0;
    var allDone=done===total;
    var hasActive=doing>0&&!allDone;
    var dotCls=allDone?'done':(hasActive?'active':'pending');
    var barColor=allDone?'#4CAF50':'#6A1B9A';
    var collapsed=_phaseCollapsed[p]?'collapsed':'';

    h+='<div class="phase-item '+collapsed+'" data-phase="'+p+'">';
    h+='<div class="pi-header" onclick="togglePhase('+p+')"><span class="pi-toggle">▼</span><div class="pi-dot '+dotCls+'"></div><div class="pi-title">'+esc(ph.name)+'</div><div class="pi-date">'+esc(ph.date)+'</div></div>';
    h+='<div class="pi-bar-wrap"><div class="pi-bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div>';
    h+='<div class="pi-stats"><span>'+total+'项</span>';
    if(done>0)h+='<span style="color:#4CAF50">已完成'+done+'</span>';
    if(doing>0)h+='<span style="color:#1565C0">进行中'+doing+'</span>';
    var pend=total-done-doing;
    if(pend>0)h+='<span style="color:#E65100">待开展'+pend+'</span>';
    h+='<span><b>'+pct+'%</b></span></div>';
    h+='<div class="pi-tasks">';
    for(var j=0;j<tasks.length;j++){
      var t=tasks[j];
      var si=sInfo(t);
      var pc=pCls(t.priority);
      h+='<div class="pi-task"><span class="pt-idx '+pc+'">'+t.id+'</span><span class="pt-name">'+esc(t.name)+'</span><span class="tag '+si.tag+'">'+si.lbl+'</span><span class="pt-owner">'+esc(t.owner)+'</span></div>';
    }
    h+='</div></div>';
  }
  document.getElementById('phasesContent').innerHTML=h;
}

/* ===== Phase Collapse/Expand ===== */
var _phaseCollapsed=[false,false,false,false];
function togglePhase(p){
  _phaseCollapsed[p]=!_phaseCollapsed[p];
  var el=document.querySelector('.phase-item[data-phase="'+p+'"]');
  if(el)el.classList.toggle('collapsed',_phaseCollapsed[p]);
}

function renderBinding(){
  var seats=_data.seats;
  var totalBound=0,totalAll=0;
  for(var i=0;i<seats.length;i++){totalBound+=seats[i].bound;totalAll+=seats[i].total;}
  document.getElementById('bindingSummary').innerHTML='数据来源：金山文档实时同步 | 更新时间：'+esc(_data.syncTime)+' | 已绑定 <b style="color:#006B54;font-size:14px">'+totalBound+'</b>/'+totalAll;

  var h='';
  for(var i=0;i<seats.length;i++){
    var d=seats[i];
    var pct=d.total?Math.round(d.bound/d.total*100):0;
    var r=20,cx=22,cy=22,circLen=2*Math.PI*r;
    var fc=pct>=100?'#4CAF50':pct>0?'#1565C0':'#BDBDBD';
    var st=pct>=100?'✅ 全部完成':pct>0?'⏳ 进行中 '+pct+'%':'⏳ 未开始';
    var sc=pct>=100?'ready':'pending';
    h+='<div class="binding-card">';
    h+='<div class="bc-name">'+esc(d.dept)+'</div>';
    h+='<div class="bc-ring"><svg viewBox="0 0 44 44">';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#E0E0E0" stroke-width="3.5"/>';
    h+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+fc+'" stroke-width="3.5" stroke-dasharray="'+Math.round(pct*circLen/100)+' '+Math.round(circLen-pct*circLen/100)+'" stroke-linecap="round" transform="rotate(-90 '+cx+' '+cy+')"/>';
    h+='<text x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" font-size="9" font-weight="800" fill="'+fc+'">'+d.bound+'</text>';
    h+='<text x="'+cx+'" y="'+(cy+8)+'" text-anchor="middle" font-size="6" fill="#999">/'+d.total+'</text>';
    h+='</svg></div>';
    h+='<div class="bc-count">'+d.bound+'/'+d.total+' 台</div>';
    h+='<div class="bc-status '+sc+'">'+st+'</div>';
    h+='</div>';
  }
  document.getElementById('bindingGrid').innerHTML=h;
}

function renderDelay(){
  var delayed=_data.stats.delayed||0;
  if(delayed>0){
    document.getElementById('delaySection').style.borderLeftColor='#C62828';
    document.getElementById('delayTitle').style.color='#C62828';
    document.getElementById('delayTitle').innerHTML='⚠️ '+delayed+'项延期工作项';
    document.getElementById('delayContent').innerHTML='请关注延期任务进度，及时推进整改';
  }else{
    document.getElementById('delaySection').style.borderLeftColor='#4CAF50';
    document.getElementById('delayTitle').style.color='#4CAF50';
    document.getElementById('delayTitle').innerHTML='✅ 无延期工作项';
    document.getElementById('delayContent').innerHTML='所有任务均在计划时间内推进中 🎉';
  }
}

/* ===== Sync ===== */
function showToast(msg,type,dur){
  type=type||'info';dur=dur||3000;
  var t=document.getElementById('syncToast');
  t.textContent=msg;t.className='sync-toast show '+type;
  setTimeout(function(){t.className='sync-toast'},dur);
}

function doFetch(){
  return fetch(DATA_URL+'?t='+Date.now()).then(function(r){
    if(!r.ok)throw new Error('数据文件未找到');
    return r.json();
  });
}

function syncFromCloud(){
  var btn=document.getElementById('syncBtn');
  btn.classList.add('syncing');
  btn.innerHTML='⏳ 同步中...';
  showToast('正在获取最新项目数据...','info',2000);
  doFetch().then(function(data){
    _data=data;
    renderAll();
    btn.classList.remove('syncing');
    btn.innerHTML='🔄 同步项目计划';
    showToast('✅ 数据已全量刷新（'+data.syncTime+'更新）','success',3000);
  }).catch(function(err){
    btn.classList.remove('syncing');
    btn.innerHTML='🔄 同步项目计划';
    showToast('❌ 同步失败：'+err.message,'error',5000);
  });
}

/* ===== Init ===== */
document.addEventListener('DOMContentLoaded',function(){
  doFetch().then(function(data){
    _data=data;
    renderAll();
  }).catch(function(err){
    document.getElementById('timelineContent').innerHTML='<div style="text-align:center;padding:20px;color:#C62828">数据加载失败：'+esc(err.message)+'</div>';
    document.getElementById('phasesContent').innerHTML='<div style="text-align:center;padding:20px;color:#C62828">请检查网络连接后刷新页面</div>';
  });
});
</script>
